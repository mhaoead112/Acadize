name: Frontend Performance Budget

on:
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/frontend-performance-budget.yml'
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/frontend-performance-budget.yml'

jobs:
  budget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build + Bundle Budget
        run: npm run perf:ci

      - name: i18n Guardrails
        run: npm run i18n:ci
